<!DOCTYPE html>
<html lang="fr" data-theme="dark"> <head>
    <meta charset="UTF-8">
    <title>Dashboard Admin - QuiVaLa</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="dashboard.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle-btn">🌙</button>

    <div class="dashboard-wrapper bento-grid">
        
        <div class="bento-card header-card">
            <div>
                <h1 style="font-size: 16px; color: var(--text-secondary); margin-bottom: 5px;">Qui Va Là ?</h1>
                <h2 id="welcome-message">Bienvenue</h2>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="toggle-history-btn" class="primary">Voir l'historique</button>
                <button id="logout-btn" class="danger">Déconnexion</button>
            </div>
        </div>

        <div id="main-section" class="bento-grid">
            <div class="bento-card">
                <div class="filter-bar">
                    <input type="text" id="search-input" placeholder="🔍 Rechercher par nom, email, formation, local..." style="flex-grow: 1;">
                    <button id="refresh-btn">🔄 Actualiser</button>
                </div>
            </div>

            <div class="bento-card table-container">
                <table id="visits-table">
                    <thead>
                        <tr>
                            <th>Prénom</th>
                            <th>Nom</th>
                            <th>Date</th>
                            <th>Arrivée</th>
                            <th>Départ</th>
                            <th>Cible</th>
                            <th>Local</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="history-section" class="hidden bento-grid">
            <div class="bento-card">
                <div class="filter-bar">
                    <div class="filter-group">
                        <label>Du :</label>
                        <input type="date" id="filter-start-date">
                    </div>
                    <div class="filter-group">
                        <label>Au :</label>
                        <input type="date" id="filter-end-date">
                    </div>
                    <div class="filter-group">
                        <label>Motif :</label>
                        <select id="filter-type">
                            <option value="">Tous</option>
                            <option value="Visite">Visite</option>
                            <option value="Formation">Formation</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Local :</label>
                        <input type="text" id="filter-local" placeholder="Ex: Salle B...">
                    </div>
                    <button id="btn-apply-filters" class="primary">Filtrer</button>
                    <button id="btn-reset-filters">Effacer</button>
                    <button id="btn-export-csv" class="danger" style="margin-left: auto;">⬇️ Exporter CSV</button>
                </div>
            </div>

            <div class="bento-card table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Prénom</th>
                            <th>Nom</th>
                            <th>Date</th>
                            <th>Arrivée</th>
                            <th>Départ</th>
                            <th>Cible</th>
                            <th>Local</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>
</body>
</html>
