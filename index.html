<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <script type="module" src="main.js"></script>
</head>
<body>
    <h1>Tableau de bord "Qui Va Là ?"</h1>
    
    <h2 id="welcome-message"></h2>
    <button id="logout-btn">Se déconnecter</button>
    <hr>

    <!-- BLOC : Recherche & Rafraîchissement -->
    <div style="margin-bottom: 20px;">
        <input type="text" id="search-input" placeholder="Rechercher par nom, email, formation, personnel ou local..." style="padding: 5px; width: 400px;">
        <button id="refresh-btn" style="padding: 5px 15px;">Rafraîchir les données</button>
    </div>

    <table border="1" id="visits-table">
        <thead>
            <tr>
                <th>Prénom</th>
                <th>Nom</th>
                <th>Date</th>
                <th>Heure d'entrée</th>
                <th>Heure de sortie</th>
                <th>Type de visite</th>
                <th>Local</th>
            </tr>
        </thead>
        <tbody>
            <!-- Injecté via JS -->
        </tbody>
    </table>
</body>
</html>
